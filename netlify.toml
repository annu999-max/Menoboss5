[build]
  publish = "."
  functions = "netlify/functions"

[[redirects]]
  from = "/api/generate-report"
  to = "/.netlify/functions/generate-report"
  status = 200

[[redirects]]
  from = "/api/create-checkout-session"
  to = "/.netlify/functions/create-checkout-session"
  status = 200

[[redirects]]
  from = "/api/verify-payment"
  to = "/.netlify/functions/verify-payment"
  status = 200
